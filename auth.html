<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Productivity Dashboard | Authentication</title>

    <!-- CSS -->
    <link rel="stylesheet" href="./css/style.css">
    <link rel="stylesheet" href="./css/auth.css">

    <!-- Remix Icons -->
    <link
        rel="stylesheet"
        href="https://cdn.jsdelivr.net/npm/remixicon@4.6.0/fonts/remixicon.css"
    >
</head>

<body>

<main class="auth-page">

    <!-- LEFT SIDE -->

    <section class="brand-section">

        <div class="brand-content">

            <h1 class="logo">
                Productivity Dashboard
            </h1>

            <h2>
                Organize.
                <br>
                Focus.
                <br>
                Achieve.
            </h2>

            <p>
                Manage your daily work, stay focused, and keep everything
                organized from one beautiful dashboard.
            </p>

        </div>

    </section>

    <!-- RIGHT SIDE -->

    <section class="auth-section">

        <div class="auth-card">

            <!-- FORM HEADER -->

            <div class="form-header">

                <button
                    id="login-tab"
                    class="tab-btn active"
                    type="button"
                >
                    Login
                </button>

                <button
                    id="register-tab"
                    class="tab-btn"
                    type="button"
                >
                    Register
                </button>

            </div>

            <div id="auth-message" class="auth-message"></div>
            <!-- LOGIN FORM -->

            <form
                id="login-form"
                class="auth-form"
                novalidate
            >

                <h2>Welcome Back</h2>

                <p>
                    Login using your username or email.
                </p>

                <div class="form-group">

                    <label for="login-identifier">
                        Username or Email
                    </label>

                    <input
                        type="text"
                        id="login-identifier"
                        class="form-input"
                        placeholder="Enter username or email"
                    >

                    <small class="error-message"></small>

                </div>

                <div class="form-group">

                    <label for="login-password">
                        Password
                    </label>

                    <div class="password-box">

                        <input
                            type="password"
                            id="login-password"
                            class="form-input"
                            placeholder="Enter password"
                        >

                        <button
                            type="button"
                            id="login-password-toggle"
                            class="password-toggle"
                        >
                            <i class="ri-eye-line"></i>
                        </button>

                    </div>

                    <small class="error-message"></small>

                </div>

                <button
                    id="login-btn"
                    class="primary-btn"
                    type="submit"
                >
                    Login
                </button>

            </form>

            <!-- REGISTER FORM -->

            <form
                id="register-form"
                class="auth-form hidden"
                novalidate
            >

                <h2>Create Account</h2>

                <p>
                    Create your productivity account.
                </p>

                <div class="form-group">

                    <label for="full-name">
                        Full Name
                    </label>

                    <input
                        type="text"
                        id="full-name"
                        class="form-input"
                        placeholder="John Doe"
                    >

                    <small class="error-message"></small>

                </div>

                <div class="form-group">

                    <label for="username">
                        Username
                    </label>

                    <input
                        type="text"
                        id="username"
                        class="form-input"
                        placeholder="CodeWizard"
                    >

                    <small class="error-message"></small>

                </div>

                <div class="form-group">

                    <label for="email">
                        Email
                    </label>

                    <input
                        type="email"
                        id="email"
                        class="form-input"
                        placeholder="example@gmail.com"
                    >

                    <small class="error-message"></small>

                </div>

                <div class="form-group">

                    <label for="password">
                        Password
                    </label>

                    <div class="password-box">

                        <input
                            type="password"
                            id="password"
                            class="form-input"
                            placeholder="Minimum 8 characters"
                        >

                        <button
                            type="button"
                            id="register-password-toggle"
                            class="password-toggle"
                        >
                            <i class="ri-eye-line"></i>
                        </button>

                    </div>

                    <small class="error-message"></small>

                </div>

                <div class="form-group">

                    <label for="confirm-password">
                        Confirm Password
                    </label>

                    <div class="password-box">

                        <input
                            type="password"
                            id="confirm-password"
                            class="form-input"
                            placeholder="Confirm password"
                        >

                        <button
                            type="button"
                            id="confirm-password-toggle"
                            class="password-toggle"
                        >
                            <i class="ri-eye-line"></i>
                        </button>

                    </div>

                    <small class="error-message"></small>

                </div>

                <button
                    id="register-btn"
                    class="primary-btn"
                    type="submit"
                >
                    Create Account
                </button>

            </form>

        </div>

    </section>

</main>

<script src="./js/utils.js"></script>
<script src="./js/auth.js"></script>

</body>
</html>
